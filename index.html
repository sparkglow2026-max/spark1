<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SPARK - Coming Soon</title>

  <!-- Font Awesome -->
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      min-height:100vh;
      overflow:hidden;
      position:relative;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
      background:#000;
      color:white;
    }

    /* =========================
       SINGLE BACKGROUND IMAGE
    ========================== */

    .background{
      position:absolute;
      inset:0;

      background-image:url('your-image.jpg');
      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;

      z-index:1;

      animation:zoomSlow 18s ease-in-out infinite alternate;

      filter:brightness(0.9);
    }

    /* =========================
       OVERLAY
    ========================== */

    .overlay{
      position:absolute;
      inset:0;

      background:linear-gradient(
        to bottom,
        rgba(0,0,0,0.25),
        rgba(0,0,0,0.45)
      );

      z-index:2;
      backdrop-filter:blur(1px);
    }

    /* =========================
       LOGO
    ========================== */

    .spark{
      position:absolute;
      top:5vh;
      left:50%;
      transform:translateX(-50%);
      z-index:3;

      width:100%;
      padding:0 20px;

      text-align:center;
      text-transform:uppercase;

      font-size:clamp(3rem,10vw,9rem);
      font-weight:900;
      letter-spacing:0.2em;

      text-shadow:
        0 0 15px rgba(255,255,255,0.15),
        0 0 40px rgba(255,255,255,0.08);

      animation:fadeDown 1.2s ease;
    }

    /* =========================
       BUTTON
    ========================== */

    .coming-btn{
      position:absolute;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
      z-index:3;

      padding:18px 44px;

      font-size:clamp(0.9rem,2vw,1.3rem);
      font-weight:600;

      letter-spacing:0.25em;
      text-transform:uppercase;
      text-decoration:none;
      color:white;

      border:1.5px solid rgba(255,255,255,0.7);
      border-radius:999px;

      background:rgba(255,255,255,0.08);
      backdrop-filter:blur(10px);

      transition:0.3s ease;

      animation:fadeUp 1.5s ease;
    }

    .coming-btn:hover{
      background:white;
      color:black;

      transform:translate(-50%,-50%) scale(1.05);

      box-shadow:
        0 0 25px rgba(255,255,255,0.35),
        0 0 60px rgba(255,255,255,0.15);
    }

    /* =========================
       SOCIAL ICONS
    ========================== */

    .social-icons{
      position:absolute;
      bottom:110px;
      left:50%;
      transform:translateX(-50%);
      z-index:3;

      display:flex;
      gap:22px;
      flex-wrap:wrap;
      justify-content:center;
    }

    .social-icons a{
      color:rgba(255,255,255,0.85);
      font-size:1.4rem;
      transition:0.3s ease;
    }

    .social-icons a:hover{
      color:#fff;
      transform:translateY(-4px) scale(1.15);

      text-shadow:
        0 0 10px rgba(255,255,255,0.7),
        0 0 25px rgba(255,255,255,0.4);
    }

    /* =========================
       FOOTER
    ========================== */

    .footer{
      position:absolute;
      bottom:55px;
      left:50%;
      transform:translateX(-50%);
      z-index:3;

      width:100%;
      text-align:center;
      padding:0 20px;

      font-size:0.85rem;
      letter-spacing:0.08em;

      color:rgba(255,255,255,0.7);
    }

    /* =========================
       ANIMATIONS
    ========================== */

    @keyframes zoomSlow{
      from{
        transform:scale(1);
      }
      to{
        transform:scale(1.08);
      }
    }

    @keyframes fadeDown{
      from{
        opacity:0;
        transform:translate(-50%,-30px);
      }
      to{
        opacity:1;
        transform:translate(-50%,0);
      }
    }

    @keyframes fadeUp{
      from{
        opacity:0;
        transform:translate(-50%,30px);
      }
      to{
        opacity:1;
        transform:translate(-50%,0);
      }
    }

    /* =========================
       TABLET
    ========================== */

    @media (max-width:992px){

      .spark{
        font-size:clamp(3rem,12vw,6rem);
        letter-spacing:0.15em;
      }

      .coming-btn{
        padding:16px 34px;
      }
    }

    /* =========================
       MOBILE
    ========================== */

    @media (max-width:768px){

      .spark{
        top:40px;
        font-size:clamp(2.5rem,14vw,5rem);
        letter-spacing:0.12em;
      }

      .coming-btn{
        width:85%;
        max-width:320px;

        text-align:center;

        padding:16px 20px;

        font-size:0.95rem;
        letter-spacing:0.15em;
      }

      .social-icons{
        bottom:120px;
        gap:18px;
      }

      .social-icons a{
        font-size:1.15rem;
      }

      .footer{
        font-size:0.72rem;
        bottom:70px;
      }
    }

    /* =========================
       SMALL MOBILE
    ========================== */

    @media (max-width:480px){

      .spark{
        font-size:2.2rem;
      }

      .coming-btn{
        padding:14px 18px;
        font-size:0.82rem;
      }

      .social-icons{
        gap:15px;
      }
    }

  </style>
</head>

<body>

  <!-- Single Background -->
  <div class="background"></div>

  <!-- Overlay -->
  <div class="overlay"></div>

  <!-- Logo -->
  <h1 class="spark">SPARK</h1>

  <!-- Button -->
  <a href="1page.html" class="coming-btn">
    Coming Soon
  </a>

  <!-- Social Icons -->
  <div class="social-icons">

    <a href="https://www.instagram.com/as___th_28/" target="_blank">
      <i class="fab fa-instagram"></i>
    </a>

    <a href="https://x.com/yourusername" target="_blank">
      <i class="fab fa-x-twitter"></i>
    </a>

    <a href="https://www.linkedin.com/in/yourusername/" target="_blank">
      <i class="fab fa-linkedin-in"></i>
    </a>

    <a href="https://www.youtube.com/@yourchannel" target="_blank">
      <i class="fab fa-youtube"></i>
    </a>

  </div>

  <!-- Footer -->
  <footer class="footer">
    © 2026 Spark. All rights reserved.
  </footer>

</body>
</html>
