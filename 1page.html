<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>6 Image Slider</title>

  <!-- Font Awesome -->
  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      width:100%;
      height:100vh;
      overflow:hidden;
      background:#000;
      font-family:Arial,sans-serif;
    }

    /* =========================
       FULL SCREEN SLIDER
    ========================== */

    .slider{
      position:relative;
      width:100vw;
      height:100vh;
      overflow:hidden;
    }

    .slides{
      display:flex;
      width:100%;
      height:100%;
      transition:transform 0.8s ease-in-out;
    }

    .slide{
      min-width:100%;
      height:100%;
      position:relative;
    }

    .slide img{
      width:100%;
      height:100%;
      object-fit:cover;
      object-position:center;
      display:block;
    }

    /* =========================
       LAST SLIDE TEXT
    ========================== */

    .last-text{
      position:absolute;
      top:50%;
      left:50%;

      transform:translate(-50%,-50%);

      z-index:5;

      color:white;

      font-size:clamp(2rem,5vw,5rem);
      font-weight:800;

      text-transform:uppercase;
      letter-spacing:0.15em;

      text-align:center;

      text-shadow:
        0 5px 20px rgba(0,0,0,0.6),
        0 0 40px rgba(255,255,255,0.2);
    }

    /* =========================
       DARK OVERLAY
    ========================== */

    .slide::before{
      content:"";
      position:absolute;
      inset:0;

      background:
      linear-gradient(
        to top,
        rgba(0,0,0,0.25),
        rgba(0,0,0,0.05)
      );

      z-index:1;
    }

    /* =========================
       BUTTONS
    ========================== */

    .btn{
      position:absolute;
      top:50%;
      transform:translateY(-50%);

      width:55px;
      height:55px;

      border:none;
      border-radius:50%;

      background:rgba(255,255,255,0.15);
      color:white;

      font-size:1.3rem;

      cursor:pointer;

      z-index:10;

      backdrop-filter:blur(10px);

      transition:0.3s ease;
    }

    .btn:hover{
      background:white;
      color:black;

      transform:translateY(-50%) scale(1.08);
    }

    .prev{
      left:25px;
    }

    .next{
      right:25px;
    }

    /* =========================
       DOTS
    ========================== */

    .dots{
      position:absolute;
      bottom:35px;
      left:50%;
      transform:translateX(-50%);

      display:flex;
      gap:12px;

      z-index:10;
    }

    .dot{
      width:12px;
      height:12px;

      border-radius:50%;
      background:rgba(255,255,255,0.5);

      transition:0.3s ease;
    }

    .dot.active{
      background:white;
      transform:scale(1.2);
    }

    /* =========================
       MOBILE
    ========================== */

    @media (max-width:768px){

      .btn{
        width:45px;
        height:45px;
        font-size:1rem;
      }

      .prev{
        left:15px;
      }

      .next{
        right:15px;
      }

      .dots{
        bottom:20px;
      }

      .last-text{
        font-size:2rem;
        letter-spacing:0.08em;
        width:90%;
      }
    }

  </style>
</head>

<body>

  <div class="slider">

    <div class="slides" id="slides">

      <!-- Slide 1 -->
      <div class="slide">
        <img src="images/image1.jpg" alt="">
      </div>

      <!-- Slide 2 -->
      <div class="slide">
        <img src="images/image2.jpg" alt="">
      </div>

      <!-- Slide 3 -->
      <div class="slide">
        <img src="images/image3.jpg" alt="">
      </div>

      <!-- Slide 4 -->
      <div class="slide">
        <img src="images/image4.jpg" alt="">
      </div>

      <!-- Slide 5 -->
      <div class="slide">
        <img src="images/image5.jpg" alt="">
      </div>

      <!-- Slide 6 -->
      <div class="slide">

        <img src="images/image6.jpg" alt="">

        <div class="last-text">
          Let's Begin Together
        </div>

      </div>

    </div>

    <!-- Previous Button -->
    <button class="btn prev" onclick="prevSlide()">
      <i class="fas fa-chevron-left"></i>
    </button>

    <!-- Next Button -->
    <button class="btn next" onclick="nextSlide()">
      <i class="fas fa-chevron-right"></i>
    </button>

    <!-- Dots -->
    <div class="dots">
      <span class="dot active"></span>
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>

  </div>

  <script>

    const slides = document.getElementById("slides");
    const dots = document.querySelectorAll(".dot");

    let index = 0;
    const totalSlides = 6;

    function updateSlider(){

      slides.style.transform = `translateX(-${index * 100}vw)`;

      dots.forEach(dot => dot.classList.remove("active"));
      dots[index].classList.add("active");
    }

    function nextSlide(){

      index++;

      if(index >= totalSlides){
        index = 0;
      }

      updateSlider();
    }

    function prevSlide(){

      index--;

      if(index < 0){
        index = totalSlides - 1;
      }

      updateSlider();
    }

    /* =========================
       AUTO SLIDE
    ========================== */

    setInterval(() => {
      nextSlide();
    }, 4000);

  </script>

</body>
</html>
